name: Scanner + TraderFox-Alarme

on:
  schedule:
    # Freitags-Putz (Mathias, 23.07.2026): Jeden Freitag ZWEI MINUTEN NACH
    # NASDAQ-SCHLUSS (16:02 New York — der Anker ist die Boersenuhr, nicht
    # die Wiener; Praezisierung vom selben Abend) alle Alarme loeschen.
    # Uebers Wochenende laedt Gerhard die neue Wochenliste hoch, am Montag
    # wird frisch eingetragen (der Putz leert auch das
    # Fortschrittsgedaechtnis, Montag braucht daher kein neu=true).
    # In normalen Wochen ist 16:02 New York = 22:02 Wien; in den
    # Umstellungswochen (USA frueher/spaeter als Europa) = 21:02 Wien.
    # Cron laeuft in UTC: 16:02 New York ist 20:02 UTC (US-Sommerzeit)
    # bzw. 21:02 UTC (US-Winterzeit). Es stehen BEIDE Termine, und der
    # Schritt prueft selbst die New Yorker Uhr: Vor 16:02 New York wird
    # NICHT geloescht (kein Putz in laufenden Handel), danach darf jeder
    # Zwilling ran — ein doppelter Putz ist harmlos, der zweite findet
    # ein leeres Konto vor. So ueberlebt der Putz auch GitHubs notorische
    # Zeitplan-Verspaetungen.
    - cron: "2 20 * * 5"
    - cron: "2 21 * * 5"
  workflow_dispatch:
    inputs:
      modus:
        description: "Was soll laufen?"
        required: true
        default: "selbsttest"
        type: choice
        options:
          - selbsttest        # prüft nur, ob TraderFox noch wie erwartet aussieht
          - testalarm         # EIN Testalarm: anlegen, prüfen, wieder löschen
          - testpush          # nur eine ntfy-Testnachricht aufs Handy
          - test_2_aktien     # Scanner + Alarme für 2 Aktien
          - vollstaendig      # Scanner + Alarme für alle Treffer
          - aufraeumen        # gezielt einzelne Alarme entfernen
          - alles_loeschen    # SÄMTLICHE Alarme löschen (Feld 'loeschen' = ALLE)
      alle_level:
        description: "Auch Fallback-Level alarmieren? (true/false)"
        required: false
        default: "false"
      neu:
        description: "Fortschritt ignorieren, alles neu setzen? (true/false) — nötig nach alles_loeschen"
        required: false
        default: "false"
      loeschen:
        description: "Für 'aufraeumen': z. B. BIOA:21.28,CRNX:83.64 — für 'alles_loeschen': ALLE"
        required: false
        default: ""

jobs:
  lauf:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    # actions: read wird gebraucht, um im Modus 'aufraeumen' die
    # kaufpunkte.xlsx aus dem Scanner-Workflow zu holen (Firmennamen).
    # Ohne diese Berechtigung scheitert der Download mit
    # "Resource not accessible by integration" — daran ist der Wächter
    # bei seinem ersten Lauf gescheitert.
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: |
          pip install requests pandas numpy scipy openpyxl playwright yfinance
          playwright install chromium --with-deps

      # Session und Fortschritt über Läufe hinweg behalten
      - name: Session/Fortschritt laden
        uses: actions/cache@v4
        with:
          path: |
            session.json
            fortschritt.json
          key: traderfox-state-${{ github.run_id }}
          restore-keys: traderfox-state-

      # --- Selbsttest: ändert nichts, prüft nur die Bedienelemente ---
      - name: "Selbsttest (TraderFox-Oberfläche prüfen)"
        if: ${{ github.event.inputs.modus == 'selbsttest' }}
        env:
          TRADERFOX_USER: ${{ secrets.TRADERFOX_USER }}
          TRADERFOX_PASS: ${{ secrets.TRADERFOX_PASS }}
        run: python traderfox_alarm_bot.py --selbsttest

      # --- Testalarm: legt EINEN Alarm an und loescht ihn wieder ---
      # Braucht den Scanner nicht, laeuft daher in wenigen Minuten.
      - name: "Testalarm (anlegen, prüfen, löschen)"
        if: ${{ github.event.inputs.modus == 'testalarm' }}
        env:
          TRADERFOX_USER: ${{ secrets.TRADERFOX_USER }}
          TRADERFOX_PASS: ${{ secrets.TRADERFOX_PASS }}
        run: python traderfox_alarm_bot.py --testalarm

      # --- Alles loeschen: SAEMTLICHE Alarme entfernen ---
      # Verriegelung: laeuft nur, wenn im Feld 'loeschen' woertlich ALLE
      # steht — ein versehentlicher Klick auf den Modus allein tut nichts.
      # Bewusst ohne Alarm-Sicherung (Mathias, 23.07.2026): die Aktienliste
      # ist das Original, der Scanner erzeugt die Alarme laufend neu.
      - name: "Alles löschen (sämtliche Alarme)"
        if: ${{ github.event.inputs.modus == 'alles_loeschen' || github.event_name == 'schedule' }}
        env:
          TRADERFOX_USER: ${{ secrets.TRADERFOX_USER }}
          TRADERFOX_PASS: ${{ secrets.TRADERFOX_PASS }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Boersenuhr-Waechter: Nie vor 16:02 New York loeschen — sonst
            # fielen Alarme mitten im Handel weg. Der Zwilling der jeweils
            # anderen Jahreszeit landet vor Boersenschluss und beendet
            # sich hier wirkungslos.
            NY_STUNDE=$(TZ=America/New_York date +%H)
            NY_MINUTE=$(TZ=America/New_York date +%M)
            if [ "$NY_STUNDE" -lt 16 ] || { [ "$NY_STUNDE" -eq 16 ] && [ "$NY_MINUTE" -lt 2 ]; }; then
              echo "Freitags-Putz: In New York ist es erst ${NY_STUNDE}:${NY_MINUTE} — Börse noch offen, dieser Termin ist der Zwilling der anderen Jahreszeit. Nichts zu tun."
              exit 0
            fi
          elif [ "${{ github.event.inputs.loeschen }}" != "ALLE" ]; then
            echo "Verriegelung: Zum Bestätigen muss im Feld 'loeschen' genau ALLE stehen."
            exit 1
          fi
          python traderfox_alarm_bot.py --loesche-alle

      # --- ntfy-Testnachricht: prueft nur die Push-Kette aufs Handy ---
      - name: "Push-Testnachricht (ntfy)"
        if: ${{ github.event.inputs.modus == 'testpush' }}
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_EMAIL: ${{ secrets.NTFY_EMAIL }}
        run: python breakout_watcher.py --testpush

      # --- Aufraeumen: einzelne Alarme gezielt entfernen ---
      # Holt die aktuellen Kaufpunkte nur, um Firmennamen nachzuschlagen.
      - name: "Kaufpunkte für Firmennamen laden"
        if: ${{ github.event.inputs.modus == 'aufraeumen' }}
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scanner.yml
          name: kaufpunkte
          path: .
          if_no_artifact_found: warn

      - name: "Alarme entfernen"
        if: ${{ github.event.inputs.modus == 'aufraeumen' }}
        env:
          TRADERFOX_USER: ${{ secrets.TRADERFOX_USER }}
          TRADERFOX_PASS: ${{ secrets.TRADERFOX_PASS }}
        run: |
          if [ -z "${{ github.event.inputs.loeschen }}" ]; then
            echo "Bitte im Feld 'loeschen' angeben, was entfernt werden soll."
            exit 1
          fi
          ARGS=""
          if [ -f kaufpunkte.xlsx ]; then ARGS="kaufpunkte.xlsx"; fi
          python traderfox_alarm_bot.py $ARGS --loesche "${{ github.event.inputs.loeschen }}"

      # --- Scanner: Kaufpunkte berechnen ---
      # Nur fuer die echten Laeufe. Der Scanner dauert 20-40 Minuten, daher
      # muessen selbsttest UND testalarm hier ausgenommen sein.
      - name: "Schritt 1: Kaufpunkte berechnen"
        if: ${{ github.event.inputs.modus == 'test_2_aktien' || github.event.inputs.modus == 'vollstaendig' }}
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python pattern_scanner.py finviz_3.csv --out kaufpunkte.xlsx --rate 8

      # --- Alarm-Bot ---
      - name: "Schritt 2: Alarme in TraderFox setzen"
        if: ${{ github.event.inputs.modus == 'test_2_aktien' || github.event.inputs.modus == 'vollstaendig' }}
        env:
          TRADERFOX_USER: ${{ secrets.TRADERFOX_USER }}
          TRADERFOX_PASS: ${{ secrets.TRADERFOX_PASS }}
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.modus }}" = "test_2_aktien" ]; then EXTRA="$EXTRA --limit 2"; fi
          if [ "${{ github.event.inputs.alle_level }}" = "true" ]; then EXTRA="$EXTRA --alle"; fi
          if [ "${{ github.event.inputs.neu }}" = "true" ]; then EXTRA="$EXTRA --neu"; fi
          python traderfox_alarm_bot.py kaufpunkte.xlsx $EXTRA

      # Immer hochladen — gerade im Fehlerfall ist das Debug-Material entscheidend
      - name: Ergebnis + Diagnose hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ergebnis
          path: |
            kaufpunkte.xlsx
            debug/
          retention-days: 14
          if-no-files-found: ignore
