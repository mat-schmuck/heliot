name: Pattern-Scanner (Kaufpunkte)

on:
  # KEIN GitHub-Zeitplan mehr (Mathias, 24.07.2026): GitHubs cron kam
  # beharrlich ~9 h zu spaet (23:45-Termin erst um 08:43 frueh). Den
  # Nachtscan stoesst jetzt cron-job.org an: Auftrag "Heliot Scan",
  # taeglich 18:00 New York = ca. 00:00 Wien, per workflow_dispatch;
  # Fehler-E-Mail geht an Mathias. Das Sendefenster fuer die
  # Treffer-Nachricht (00-01 Uhr Wien, siehe unten) bleibt unveraendert
  # wirksam, weil es im Schritt selbst geprueft wird.
  workflow_dispatch: {}        # manueller Start jederzeit möglich

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 200        # 87 Ticker @ 8 Calls/min brauchen Luft
    # contents: write, damit das Ergebnis als kaufpunkte_aktuell.xlsx ins
    # Repo gelegt werden kann — davon liest die Registerkarte
    # "Aktueller Scan" in der Heliot-App (Mathias' Auftrag vom 23.07.2026).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install requests pandas numpy scipy openpyxl yfinance

      - name: Scanner ausführen
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        # Sendefenster 00:00-01:59 Wiener Zeit (Mathias, 24.07.2026):
        # Der GEWOLLTE Push ist der des Mitternachtslaufs, den cron-job.org
        # um 18:00 New York anstoesst (in der Parallel-Sitzung vom 23.07.
        # eingerichtet, mit Fehler-E-Mail an Mathias). GitHubs eigener
        # 23:45-Zeitplan hinkt derzeit ~9 h nach, kam um 08:43 an und
        # weckte mit der WIEDERHOLUNG desselben Scans um ~09:00 die
        # Handys. Nachzuegler ausserhalb des Fensters scannen deshalb
        # weiter (frische Daten fuer Heliot und den Waechter-Artefakt),
        # senden aber nichts.
        run: |
          NTFY_ARG=""
          STUNDE=$(TZ=Europe/Vienna date +%H)
          if [ "$STUNDE" = "00" ] || [ "$STUNDE" = "01" ]; then
            NTFY_ARG="--ntfy ${{ secrets.NTFY_TOPIC || 'dummy-kein-push' }}"
          fi
          python pattern_scanner.py finviz_3.csv \
            --out kaufpunkte.xlsx \
            --rate 8 $NTFY_ARG

      - name: Excel als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: kaufpunkte
          path: kaufpunkte.xlsx
          retention-days: 30

      # Ergebnis zusaetzlich ins Repo legen: Die Registerkarte
      # "Aktueller Scan" der Heliot-App liest die Datei ohne Anmeldung ueber
      # raw.githubusercontent.com — Artefakte waeren nur mit Anmeldung
      # erreichbar. Der Push loest keine anderen Workflows aus (alle laufen
      # nur per Zeitplan oder Knopfdruck); Streamlit startet die App kurz neu.
      - name: Ergebnis für die Heliot-Anzeige veröffentlichen
        run: |
          cp kaufpunkte.xlsx kaufpunkte_aktuell.xlsx
          git config user.name "pattern-scanner"
          git config user.email "actions@users.noreply.github.com"
          git add kaufpunkte_aktuell.xlsx
          if git diff --cached --quiet; then
            echo "Keine Änderung gegenüber dem letzten Scan."
          else
            git commit -m "Nachtscan: kaufpunkte_aktuell.xlsx aktualisiert"
            git pull --rebase origin main
            git push origin main
          fi
