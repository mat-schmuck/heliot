name: Breakout-Wächter (alle 6 Min)

on:
  schedule:
    # Alle 6 Minuten, 13:30 bis 21:00 UTC.
    #
    # Dieses Fenster deckt die US-Handelszeit in BEIDEN Zeitumstellungen ab:
    #   US-Sommerzeit  (EDT): 13:30-20:00 UTC
    #   US-Winterzeit  (EST): 14:30-21:00 UTC
    #
    # Cron kennt keine Zeitzonen und rechnet stur in UTC. Deshalb laeuft der
    # Zeitplan ueber den groesseren Bereich, und das Programm entscheidet
    # selbst, ob die Boerse gerade offen ist — markt_offen() in
    # breakout_watcher.py fragt dafuer die Zeitzone America/New_York ab und
    # kennt damit die amerikanischen Umstellungstermine. Ausserhalb der
    # Handelszeit bricht der Lauf sofort ab, ohne Kursdaten abzurufen.
    #
    # Damit ist immer der volle Boersenhandel abgedeckt, auch in den Wochen,
    # in denen USA und Europa unterschiedlich umgestellt haben (Ende Maerz
    # und Ende Oktober) — dann beginnt der Handel bei uns eine Stunde
    # frueher bzw. spaeter. Niemand muss zweimal im Jahr Zeiten nachziehen.
    #
    # Kontingent: 76 Laeufe am Tag, rund 1650 Actions-Minuten im Monat plus
    # etwa 43 fuer den Scanner — von 2000 Freiminuten.
    #
    # 6 ist ein Teiler von 60 und ergibt gleichmaessige Abstaende. Bei 7, 8
    # oder 9 muesste jeder Zeitpunkt einzeln stehen.
    - cron: "30,36,42,48,54 13 * * 1-5"
    - cron: "*/6 14-20 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}

# Verhindert, dass sich zwei Läufe überschneiden
concurrency:
  group: breakout-watcher
  cancel-in-progress: false

jobs:
  wachen:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # actions: read wird gebraucht, um die kaufpunkte.xlsx aus dem Artefakt
    # des Scanner-Workflows zu holen. Ohne diese Berechtigung scheitert der
    # Download mit "Resource not accessible by integration" - das Standard-
    # Token darf nur contents lesen.
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install requests pandas openpyxl yfinance

      # Die kaufpunkte.xlsx vom letzten Scanner-Lauf holen
      - name: Kaufpunkte vom letzten Scan laden
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scanner.yml
          name: kaufpunkte
          path: .
          if_no_artifact_found: warn

      # Zustand (was wurde heute schon gemeldet) über Läufe hinweg merken
      - name: Zustand laden
        uses: actions/cache@v4
        with:
          path: watcher_state.json
          key: watcher-state-${{ github.run_id }}
          restore-keys: watcher-state-

      - name: Breakouts prüfen
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_EMAIL: ${{ secrets.NTFY_EMAIL }}
          # Gerhards Bitte vom 22.07.2026: einen Handelstag lang beide
          # Volumen-Rechnungen (hochgerechnet UND roh) an jede Meldung
          # anhaengen, bevor wir uns auf die Schwellen verlassen.
          # NACH EINEM VOLLEN HANDELSTAG DIESE ZEILE WIEDER ENTFERNEN.
          VOL_VERGLEICH: "1"
        run: |
          if [ ! -f kaufpunkte.xlsx ]; then
            echo "Keine kaufpunkte.xlsx gefunden — erst den Scanner laufen lassen."
            exit 0
          fi
          python breakout_watcher.py kaufpunkte.xlsx
