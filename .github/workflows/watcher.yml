name: Breakout-Wächter (alle 45 Min)

on:
  schedule:
    # Alle 45 Minuten während der US-Handelszeiten (13:00-20:45 UTC = 15:00-22:45 Wien)
    #
    # Der Takt ist durch zwei Grenzen bestimmt:
    #
    # 1. Twelve Data Free-Tier: 8 Abfragen je Minute, und JEDES Symbol zählt
    #    einzeln. 31 Aktien brauchen daher 4 Blöcke mit je gut 60 Sekunden
    #    Pause — ein Lauf dauert rund 5 Minuten statt einer.
    # 2. GitHub Actions: 2000 Freiminuten im Monat, jeder Job wird auf volle
    #    Minuten aufgerundet.
    #
    # Damit ergibt sich: 30 Min Takt = ~2018 Min/Monat (zu viel),
    # 45 Min = ~1367, 60 Min = ~1150. Plus rund 282 Minuten für den täglichen
    # Scanner. (Entscheidung von Mathias, 21.07.2026.)
    #
    # Für Daytrading ist das eigentlich zu langsam. Schneller ginge es mit
    # einer Kursquelle ohne so enges Minutenlimit und mit zwischengespeicherten
    # pip-Paketen — siehe Notizen im Projekt.
    #
    # ACHTUNG: "*/45" waere FALSCH. Cron liest das als "Minute 0 und 45 jeder
    # Stunde", die Abstaende waeren also abwechselnd 45 und 15 Minuten - 16
    # Laeufe am Tag statt 10. 45 ist kein Teiler von 60, deshalb muessen die
    # Zeitpunkte einzeln stehen. Ergibt 11 Laeufe: 13:00 bis 20:30 UTC.
    - cron: "0 13 * * 1-5"
    - cron: "45 13 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "15 15 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "45 16 * * 1-5"
    - cron: "30 17 * * 1-5"
    - cron: "15 18 * * 1-5"
    - cron: "0 19 * * 1-5"
    - cron: "45 19 * * 1-5"
    - cron: "30 20 * * 1-5"
  workflow_dispatch: {}

# Verhindert, dass sich zwei Läufe überschneiden
concurrency:
  group: breakout-watcher
  cancel-in-progress: false

jobs:
  wachen:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # actions: read wird gebraucht, um die kaufpunkte.xlsx aus dem Artefakt
    # des Scanner-Workflows zu holen. Ohne diese Berechtigung scheitert der
    # Download mit "Resource not accessible by integration" - das Standard-
    # Token darf nur contents lesen.
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install requests pandas openpyxl

      # Die kaufpunkte.xlsx vom letzten Scanner-Lauf holen
      - name: Kaufpunkte vom letzten Scan laden
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scanner.yml
          name: kaufpunkte
          path: .
          if_no_artifact_found: warn

      # Zustand (was wurde heute schon gemeldet) über Läufe hinweg merken
      - name: Zustand laden
        uses: actions/cache@v4
        with:
          path: watcher_state.json
          key: watcher-state-${{ github.run_id }}
          restore-keys: watcher-state-

      - name: Breakouts prüfen
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_EMAIL: ${{ secrets.NTFY_EMAIL }}
        run: |
          if [ ! -f kaufpunkte.xlsx ]; then
            echo "Keine kaufpunkte.xlsx gefunden — erst den Scanner laufen lassen."
            exit 0
          fi
          python breakout_watcher.py kaufpunkte.xlsx
