name: Breakout-Wächter (alle 6 Min)

on:
  schedule:
    # Alle 6 Minuten, genau während der US-Handelszeit:
    # 13:30-20:00 UTC = 15:30-22:00 Wiener Zeit. Ergibt 66 Läufe am Tag.
    #
    # Warum genau dieses Fenster: Vorher lief der Wächter 13:00-20:50 UTC
    # und damit acht Mal täglich ausserhalb der Handelszeit — dort bewegt
    # sich kein Kurs, die Läufe kosteten nur Kontingent.
    #
    # Warum 6 und nicht weniger — gemessen, nicht geschätzt:
    # Seit dem Yahoo-Sammelabruf dauert ein Lauf 33 Sekunden statt 216.
    # GitHub rundet jeden Job auf volle Minuten auf, ein Lauf kostet also
    # 1 Minute vom Freikontingent (2000 im Monat).
    #   5 Min Takt = 79 Läufe/Tag = ~1757 Min/Monat, Puffer nur 243
    #   6 Min Takt = 66 Läufe/Tag = ~1475 Min/Monat, Puffer 525
    # 5 Minuten ist zudem GitHubs Mindestabstand, und genau dort werden
    # Läufe bei hoher Last am häufigsten verzögert oder übersprungen.
    #
    # 6 ist ein Teiler von 60, daher gleichmäßige Abstände. Bei 7, 8 oder 9
    # müsste jeder Zeitpunkt einzeln stehen (siehe frühere Fassung mit 45).
    #
    # ACHTUNG Zeitumstellung: Diese Zeiten gelten für die US-Sommerzeit.
    # Ab Anfang November handelt New York 14:30-21:00 UTC — dann müssen die
    # Stundenangaben um eins nach hinten.
    - cron: "30,36,42,48,54 13 * * 1-5"
    - cron: "*/6 14-19 * * 1-5"
    - cron: "0 20 * * 1-5"
  workflow_dispatch: {}

# Verhindert, dass sich zwei Läufe überschneiden
concurrency:
  group: breakout-watcher
  cancel-in-progress: false

jobs:
  wachen:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # actions: read wird gebraucht, um die kaufpunkte.xlsx aus dem Artefakt
    # des Scanner-Workflows zu holen. Ohne diese Berechtigung scheitert der
    # Download mit "Resource not accessible by integration" - das Standard-
    # Token darf nur contents lesen.
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install requests pandas openpyxl yfinance

      # Die kaufpunkte.xlsx vom letzten Scanner-Lauf holen
      - name: Kaufpunkte vom letzten Scan laden
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scanner.yml
          name: kaufpunkte
          path: .
          if_no_artifact_found: warn

      # Zustand (was wurde heute schon gemeldet) über Läufe hinweg merken
      - name: Zustand laden
        uses: actions/cache@v4
        with:
          path: watcher_state.json
          key: watcher-state-${{ github.run_id }}
          restore-keys: watcher-state-

      - name: Breakouts prüfen
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_EMAIL: ${{ secrets.NTFY_EMAIL }}
        run: |
          if [ ! -f kaufpunkte.xlsx ]; then
            echo "Keine kaufpunkte.xlsx gefunden — erst den Scanner laufen lassen."
            exit 0
          fi
          python breakout_watcher.py kaufpunkte.xlsx
