name: Breakout-Wächter (alle 6 Min)

on:
  # KEIN GitHub-Zeitplan mehr (Mathias, 24.07.2026): GitHubs cron hinkte
  # fuer dieses Repo beharrlich Stunden nach (belegt 22.-24.07., z. B.
  # 23:45-Termin kam um 08:43). Die Zeitsteuerung liegt jetzt komplett bei
  # cron-job.org (Konto von Mathias, Fehler-E-Mails an ihn):
  #   - "Heliot" wochentags 09:12 New York -> Dauerwache 390 Min
  #   - "Heliot Teil 2 (Schlussstunde)" wochentags 15:09 New York
  #     (haengt sich per concurrency hinter die Tagwache und uebernimmt
  #     die letzte Stunde, weil 390 Min ab 09:12 um ~15:42 enden)
  # Beide rufen workflow_dispatch ueber die GitHub-API auf. Die
  # Warte-bis-zur-Eroeffnung-Logik (sekunden_bis_eroeffnung) bleibt im
  # Programm: Startet die Tagwache vor 09:30 New York, wartet sie bis zur
  # Glocke. Zusaetzliches Sicherheitsnetz: die lokale 15:10-Aufgabe
  # "boersenwaechter-absicherung" auf Mathias' Rechner prueft werktags,
  # ob wirklich ein Waechter laeuft, und startet sonst selbst einen.
  workflow_dispatch:
    inputs:
      dauerwache:
        description: "Minuten am Stück wachen (0 = einmal prüfen). 390 = ganzer Handelstag."
        required: false
        default: "0"

# Verhindert, dass sich zwei Läufe überschneiden
concurrency:
  group: breakout-watcher
  cancel-in-progress: false

jobs:
  wachen:
    runs-on: ubuntu-latest
    # Hoch genug fuer eine Dauerwache ueber den ganzen Handelstag
    # (6,5 h Handel + Wartezeit vor der Eroeffnung). Normale Laeufe
    # beenden sich nach wenigen Minuten von selbst.
    timeout-minutes: 355
    # actions: read wird gebraucht, um die kaufpunkte.xlsx aus dem Artefakt
    # des Scanner-Workflows zu holen. Ohne diese Berechtigung scheitert der
    # Download mit "Resource not accessible by integration" - das Standard-
    # Token darf nur contents lesen.
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install requests pandas openpyxl yfinance

      # Die kaufpunkte.xlsx vom letzten Scanner-Lauf holen
      - name: Kaufpunkte vom letzten Scan laden
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scanner.yml
          name: kaufpunkte
          path: .
          if_no_artifact_found: warn

      # Zustand (was wurde heute schon gemeldet) über Läufe hinweg merken
      - name: Zustand laden
        uses: actions/cache@v4
        with:
          path: watcher_state.json
          key: watcher-state-${{ github.run_id }}
          restore-keys: watcher-state-

      - name: Breakouts prüfen
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_EMAIL: ${{ secrets.NTFY_EMAIL }}
        run: |
          if [ ! -f kaufpunkte.xlsx ]; then
            echo "Keine kaufpunkte.xlsx gefunden — erst den Scanner laufen lassen."
            exit 0
          fi
          python breakout_watcher.py kaufpunkte.xlsx --dauerwache "${{ github.event.inputs.dauerwache || '0' }}"
