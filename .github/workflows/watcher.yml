name: Breakout-Wächter (alle 10 Min)

on:
  schedule:
    # Alle 10 Minuten während der US-Handelszeiten (13:00-20:50 UTC = 15:00-22:50 Wien)
    #
    # Warum 10 und nicht weniger — gemessen, nicht geschätzt:
    #
    # Seit der Umstellung auf den Yahoo-Sammelabruf dauert ein Lauf 33
    # Sekunden statt 216. GitHub rundet aber jeden Job auf volle Minuten auf,
    # ein Lauf kostet also 1 Minute vom Freikontingent (2000 im Monat).
    #
    # Daraus: 5 Min Takt = 96 Läufe/Tag = ~2127 Min/Monat, also ZU VIEL.
    #         10 Min Takt = 48 Läufe/Tag = ~1085 Min/Monat, passt.
    #         (jeweils inklusive rund 43 Minuten für den täglichen Scanner)
    #
    # 5 Minuten wäre ohnehin der Mindestabstand bei GitHub, und kurze
    # Intervalle werden bei hoher Last häufiger verzögert oder ganz
    # übersprungen. 10 Minuten ist damit das kleinstmögliche Raster, das
    # verlässlich ins Freikontingent passt.
    #
    # "*/10" ist hier korrekt, weil 10 ein Teiler von 60 ist — anders als
    # beim früheren Versuch mit "*/45", wo Cron daraus Abstände von
    # abwechselnd 45 und 15 Minuten gemacht hätte.
    - cron: "*/10 13-20 * * 1-5"
  workflow_dispatch: {}

# Verhindert, dass sich zwei Läufe überschneiden
concurrency:
  group: breakout-watcher
  cancel-in-progress: false

jobs:
  wachen:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # actions: read wird gebraucht, um die kaufpunkte.xlsx aus dem Artefakt
    # des Scanner-Workflows zu holen. Ohne diese Berechtigung scheitert der
    # Download mit "Resource not accessible by integration" - das Standard-
    # Token darf nur contents lesen.
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install requests pandas openpyxl yfinance

      # Die kaufpunkte.xlsx vom letzten Scanner-Lauf holen
      - name: Kaufpunkte vom letzten Scan laden
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scanner.yml
          name: kaufpunkte
          path: .
          if_no_artifact_found: warn

      # Zustand (was wurde heute schon gemeldet) über Läufe hinweg merken
      - name: Zustand laden
        uses: actions/cache@v4
        with:
          path: watcher_state.json
          key: watcher-state-${{ github.run_id }}
          restore-keys: watcher-state-

      - name: Breakouts prüfen
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_EMAIL: ${{ secrets.NTFY_EMAIL }}
        run: |
          if [ ! -f kaufpunkte.xlsx ]; then
            echo "Keine kaufpunkte.xlsx gefunden — erst den Scanner laufen lassen."
            exit 0
          fi
          python breakout_watcher.py kaufpunkte.xlsx
